<head>

<title>Local Diff Checker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⇋</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { color: #58a6ff; }
  .badge { font-size: 11px; background: #238636; color: #fff; padding: 2px 8px; border-radius: 12px; margin-left: 8px; vertical-align: middle; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  .toolbar button { background: #238636; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; transition: background .2s; }
  .toolbar button:hover { background: #2ea043; }
  .toolbar button.secondary { background: #30363d; }
  .toolbar button.secondary:hover { background: #484f58; }
  .editors { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 60px - 48px); }
  .editor-pane { display: flex; flex-direction: column; border-right: 1px solid #30363d; }
  .editor-pane:last-child { border-right: none; }
  .editor-pane .label { background: #161b22; padding: 8px 16px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
  .editor-pane .label .file-btn { background: none; border: 1px solid #30363d; color: #8b949e; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .editor-pane .label .file-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  textarea { flex: 1; background: #0d1117; color: #c9d1d9; border: none; padding: 12px 16px; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; resize: none; outline: none; line-height: 1.6; tab-size: 4; }
  textarea::placeholder { color: #484f58; }
  .editor-pane .line-count { font-size: 11px; color: #484f58; padding: 4px 16px; background: #0d1117; border-top: 1px solid #21262d; text-align: right; }
  body.light .editor-pane .line-count { color: #afb8c1; background: #ffffff; border-color: #d0d7de; }
  .drop-highlight { outline: 2px dashed #58a6ff; outline-offset: -4px; }

  /* Diff output */
  .diff-container { display: none; height: calc(100vh - 60px - 48px); overflow: auto; background: #0d1117; }
  .diff-table { width: 100%; border-collapse: collapse; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; line-height: 1.6; }
  .diff-table td { padding: 0 12px; white-space: pre-wrap; word-break: break-all; vertical-align: top; }
  .diff-table .line-num { width: 50px; min-width: 50px; text-align: right; color: #484f58; user-select: none; padding-right: 8px; border-right: 1px solid #21262d; }
  .diff-table .line-num.left { border-right: 1px solid #21262d; }
  .diff-table .line-num.right { border-left: 1px solid #21262d; border-right: 1px solid #21262d; }
  .diff-table .spacer { width: 16px; min-width: 16px; }
  tr.diff-equal td { background: #0d1117; }
  tr.diff-delete td { background: #3d1f1f; color: #ffa198; }
  tr.diff-delete td.line-num { background: #3d1f1f; color: #f47067; }
  tr.diff-insert td { background: #1a3a2a; color: #7ee787; }
  tr.diff-insert td.line-num { background: #1a3a2a; color: #3fb950; }
  tr.diff-modify-left td { background: #3d1f1f; color: #ffa198; }
  tr.diff-modify-left td.line-num { background: #3d1f1f; color: #f47067; }
  tr.diff-modify-right td { background: #1a3a2a; color: #7ee787; }
  tr.diff-modify-right td.line-num { background: #1a3a2a; color: #3fb950; }
  .char-del { background: #6e3630; border-radius: 2px; }
  .char-ins { background: #2a6e3f; border-radius: 2px; }

  .stats { padding: 10px 24px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 13px; display: none; gap: 16px; align-items: center; }
  .stats .stat { display: flex; align-items: center; gap: 4px; }
  .stats .nav-btn { background: none; border: 1px solid #30363d; color: #8b949e; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 4px; }
  .stats .nav-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  body.light .stats .nav-btn { border-color: #d0d7de; color: #656d76; }
  body.light .stats .nav-btn:hover { border-color: #0969da; color: #0969da; }
  .stats .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .stats .dot.green { background: #3fb950; }
  .stats .dot.red { background: #f47067; }
  .stats .dot.gray { background: #8b949e; }

  /* Light theme */
  body.light { background: #ffffff; color: #1f2328; }
  body.light header { background: #f6f8fa; border-color: #d0d7de; }
  body.light header h1 span { color: #0969da; }
  body.light .badge { background: #1a7f37; color: #fff; }
  body.light .toolbar button.secondary { background: #d0d7de; color: #1f2328; }
  body.light .toolbar button.secondary:hover { background: #afb8c1; }
  body.light .editor-pane { border-color: #d0d7de; }
  body.light .editor-pane .label { background: #f6f8fa; border-color: #d0d7de; color: #1f2328; }
  body.light .editor-pane .label .file-btn { border-color: #d0d7de; color: #656d76; }
  body.light .editor-pane .label .file-btn:hover { border-color: #0969da; color: #0969da; }
  body.light textarea { background: #ffffff; color: #1f2328; }
  body.light textarea::placeholder { color: #afb8c1; }
  body.light .diff-container { background: #ffffff; }
  body.light .diff-table .line-num { color: #afb8c1; border-color: #d0d7de; }
  body.light tr.diff-equal td { background: #ffffff; color: #1f2328; }
  body.light tr.diff-delete td { background: #ffebe9; color: #82071e; }
  body.light tr.diff-delete td.line-num { background: #ffebe9; color: #cf222e; }
  body.light tr.diff-insert td { background: #dafbe1; color: #116329; }
  body.light tr.diff-insert td.line-num { background: #dafbe1; color: #1a7f37; }
  body.light tr.diff-modify-left td { background: #ffebe9; color: #82071e; }
  body.light tr.diff-modify-left td.line-num { background: #ffebe9; color: #cf222e; }
  body.light tr.diff-modify-right td { background: #dafbe1; color: #116329; }
  body.light tr.diff-modify-right td.line-num { background: #dafbe1; color: #1a7f37; }
  body.light .char-del { background: #ff818266; }
  body.light .char-ins { background: #2da44e66; }

  body.light #btnBack { background: #d0d7de !important; color: #1f2328 !important; }

  /* Help modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 28px 32px; color: #c9d1d9; position: relative; }
  .modal h2 { margin-bottom: 16px; font-size: 18px; }
  .modal p, .modal li { font-size: 14px; line-height: 1.7; }
  .modal ul { padding-left: 20px; margin: 8px 0 16px; }
  .modal .close-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer; }
  .modal .close-btn:hover { color: #c9d1d9; }
  .modal .section-title { font-weight: 600; margin-top: 14px; margin-bottom: 4px; color: #58a6ff; font-size: 14px; }
  body.light .modal { background: #ffffff; border-color: #d0d7de; color: #1f2328; }
  body.light .modal .close-btn { color: #656d76; }
  body.light .modal .close-btn:hover { color: #1f2328; }
  body.light .modal .section-title { color: #0969da; }
</style>

<header>
  <h1><span>⇋</span> Local Diff Checker <span class="badge">100% Offline</span></h1>

    <button class="secondary" id="btnTheme">🌗 Theme</button>

    <button class="secondary" id="btnSwap">⇄ Swap</button>
    <button class="secondary" id="btnClear">✕ Clear</button>
    <button class="secondary" id="btnHelp">❓ Help</button>
    <button id="btnCompare">Compare ▶</button>
  </div>
</header>

<div class="stats" id="stats">
  <div class="stat"><span class="dot green"></span> <span id="statIns">0</span> additions</div>
  <div class="stat"><span class="dot red"></span> <span id="statDel">0</span> deletions</div>
  <div class="stat"><span class="dot gray"></span> <span id="statEq">0</span> unchanged</div>
  <button class="secondary" id="btnBack" style="margin-left:auto;background:#30363d;color:#c9d1d9;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;">← Edit</button>
  <button class="nav-btn" id="btnPrev">▲ Prev</button>
  <button class="nav-btn" id="btnNext">▼ Next</button>
</div>

<div class="editors" id="editors">
  <div class="editor-pane">
    <div class="label">Original <button class="file-btn" onclick="loadFile('left')">📂 Load file</button></div>
    <textarea id="left" placeholder="Paste your original text here..."></textarea>
    <div class="line-count" id="leftCount">0 lines</div>
  </div>
  <div class="editor-pane">
    <div class="label">Modified <button class="file-btn" onclick="loadFile('right')">📂 Load file</button></div>
    <textarea id="right" placeholder="Paste your modified text here..."></textarea>
    <div class="line-count" id="rightCount">0 lines</div>
  </div>
</div>

<div class="diff-container" id="diffContainer">
  <table class="diff-table" id="diffTable"></table>
</div>

<input type="file" id="fileInput" style="display:none">

<div class="modal-overlay" id="helpModal">
  <div class="modal">
    <button class="close-btn" id="helpClose">✕</button>
    <h2 id="helpTitle">How to Use</h2>
    <div id="helpBody"></div>
  </div>
</div>

<script>
let fileTarget = null;
const fileInput = document.getElementById('fileInput');

function loadFile(target) {
  fileTarget = target;
  fileInput.click();
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById(fileTarget).value = ev.target.result;
    updateLineCount(fileTarget, fileTarget + 'Count');
  };
  reader.readAsText(file);
  fileInput.value = '';
});

// Line count
function updateLineCount(id, countId) {
  const val = document.getElementById(id).value;
  const count = val ? val.split('\n').length : 0;
  const t = translations[currentLang];
  document.getElementById(countId).textContent = count + ' ' + t.lines;
}
document.getElementById('left').addEventListener('input', () => updateLineCount('left', 'leftCount'));
document.getElementById('right').addEventListener('input', () => updateLineCount('right', 'rightCount'));

// Drag & drop
['left', 'right'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drop-highlight'); });
  el.addEventListener('dragleave', () => el.classList.remove('drop-highlight'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drop-highlight');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { el.value = ev.target.result; updateLineCount(id, id + 'Count'); };
    reader.readAsText(file);
  });
});

document.getElementById('btnTheme').onclick = () => {
  document.body.classList.toggle('light');
};

const langs = ['en', 'zh', 'fr'];
let currentLang = 'en';

function applyLang() {
  const t = translations[currentLang];
  document.querySelector('header h1').innerHTML = `<span>${t.title}</span> <span class="badge">${t.badge}</span>`;
  document.getElementById('btnLang').textContent = t.langBtn;
  document.getElementById('btnTheme').textContent = t.theme;
  document.getElementById('btnWhitespace').textContent = ignoreSpaces ? t.spacesIgnore : t.spacesCompare;
  document.getElementById('btnCase').textContent = ignoreCase ? t.caseIgnore : t.caseSensitive;
  document.getElementById('btnMode').textContent = charMode ? t.modeChar : t.modeLine;
  document.getElementById('btnPrev').textContent = t.prev;
  document.getElementById('btnNext').textContent = t.next;
  document.getElementById('btnSwap').textContent = t.swap;
  document.getElementById('btnClear').textContent = t.clear;
  document.getElementById('btnCompare').textContent = t.compare;
  document.getElementById('btnBack').textContent = t.edit;
  document.getElementById('btnHelp').textContent = t.help;
  document.getElementById('helpTitle').textContent = t.helpTitle;
  document.getElementById('helpBody').innerHTML = t.helpBody;
  document.getElementById('left').placeholder = t.placeholderLeft;
  document.getElementById('right').placeholder = t.placeholderRight;
  // Labels and load buttons
  const labels = document.querySelectorAll('.editor-pane .label');
  const labelTexts = [t.original, t.modified];
  labels.forEach((lbl, i) => {
    const btn = lbl.querySelector('.file-btn');
    btn.textContent = t.loadFile;
    lbl.childNodes[0].textContent = labelTexts[i] + ' ';
  });
  // Stats
  const statSpans = document.querySelectorAll('.stats .stat');
  const statLabels = [t.additions, t.deletions, t.unchanged];
  statSpans.forEach((s, i) => {
    const numSpan = s.querySelector('span:nth-child(2)');
    numSpan.nextSibling.textContent = ' ' + statLabels[i];
  });
}

document.getElementById('btnLang').onclick = () => {
  currentLang = langs[(langs.indexOf(currentLang) + 1) % langs.length];
  applyLang();
};

// Whitespace toggle
let ignoreSpaces = false;
let ignoreCase = false;
let charMode = false;

// Mode toggle
document.getElementById('btnMode').onclick = () => {
  charMode = !charMode;
  const t = translations[currentLang];
  document.getElementById('btnMode').textContent = charMode ? t.modeChar : t.modeLine;
};

// Case toggle
document.getElementById('btnCase').onclick = () => {
  ignoreCase = !ignoreCase;
  const t = translations[currentLang];
  document.getElementById('btnCase').textContent = ignoreCase ? t.caseIgnore : t.caseSensitive;
};

// Help modal
document.getElementById('btnHelp').onclick = () => {
  const t = translations[currentLang];
  document.getElementById('helpTitle').textContent = t.helpTitle;
  document.getElementById('helpBody').innerHTML = t.helpBody;
  document.getElementById('helpModal').classList.add('show');
};
document.getElementById('helpClose').onclick = () => {
  document.getElementById('helpModal').classList.remove('show');
};
document.getElementById('helpModal').onclick = (e) => {
  if (e.target === document.getElementById('helpModal')) {
    document.getElementById('helpModal').classList.remove('show');
  }
};

document.getElementById('btnWhitespace').onclick = () => {
  ignoreSpaces = !ignoreSpaces;
  const t = translations[currentLang];
  document.getElementById('btnWhitespace').textContent = ignoreSpaces ? t.spacesIgnore : t.spacesCompare;
};

function normalizeLine(line) {
  let l = line;
  if (ignoreSpaces) l = l.replace(/\s+/g, '');
  if (ignoreCase) l = l.toLowerCase();
  return l;
}

document.getElementById('btnSwap').onclick = () => {
  const l = document.getElementById('left'), r = document.getElementById('right');
  [l.value, r.value] = [r.value, l.value];
};

document.getElementById('btnClear').onclick = () => {
  document.getElementById('left').value = '';
  document.getElementById('right').value = '';
  showEditors();
};

document.getElementById('btnBack').onclick = showEditors;

function showEditors() {
  document.getElementById('editors').style.display = 'grid';
  document.getElementById('diffContainer').style.display = 'none';
  document.getElementById('stats').style.display = 'none';
}

document.getElementById('btnCompare').onclick = doCompare;

// Ctrl+Enter shortcut to compare
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    doCompare();
  }
});

function doCompare() {
  const a = document.getElementById('left').value;
  const b = document.getElementById('right').value;
  if (!a.trim() && !b.trim()) return;
  currentDiffIndex = -1;
  if (charMode) {
    renderCharModeDiff(a, b);
  } else {
    const diff = computeDiff(a, b);
    renderDiff(diff);
  }
  document.getElementById('editors').style.display = 'none';
  document.getElementById('diffContainer').style.display = 'block';
  document.getElementById('stats').style.display = 'flex';
};

// --- LCS-based line diff ---
function computeDiff(textA, textB) {
  const a = textA.split('\n'), b = textB.split('\n');
  const n = a.length, m = b.length;

  // Optimised LCS for reasonable sizes; fallback to simple for huge files
  const dp = Array.from({length: n+1}, () => new Int32Array(m+1));
  for (let i = 1; i <= n; i++)
    for (let j = 1; j <= m; j++)
      dp[i][j] = normalizeLine(a[i-1]) === normalizeLine(b[j-1]) ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);

  // Backtrack
  const result = [];
  let i = n, j = m;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && normalizeLine(a[i-1]) === normalizeLine(b[j-1])) {
      result.push({type:'equal', left:a[--i], right:b[--j], li:i, ri:j});
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      result.push({type:'insert', right:b[--j], ri:j});
    } else {
      result.push({type:'delete', left:a[--i], li:i});
    }
  }
  result.reverse();

  // Pair up adjacent delete+insert as modifications
  const merged = [];
  for (let k = 0; k < result.length; k++) {
    if (result[k].type === 'delete' && k+1 < result.length && result[k+1].type === 'insert') {
      merged.push({type:'modify', left:result[k].left, right:result[k+1].right, li:result[k].li, ri:result[k+1].ri});
      k++;
    } else {
      merged.push(result[k]);
    }
  }
  return merged;
}

function charDiff(a, b) {
  if (ignoreSpaces) { a = a.replace(/\s+/g, ''); b = b.replace(/\s+/g, ''); }
  if (ignoreCase) { a = a.toLowerCase(); b = b.toLowerCase(); }
  const dp2 = Array.from({length:a.length+1}, ()=>new Int32Array(b.length+1));
  for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++)
    dp2[i][j]=a[i-1]===b[j-1]?dp2[i-1][j-1]+1:Math.max(dp2[i-1][j],dp2[i][j-1]);
  let i=a.length,j=b.length; const ops=[];
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){ops.push({t:'eq',a:a[--i],b:b[--j]});}
    else if(j>0&&(i===0||dp2[i][j-1]>=dp2[i-1][j])){ops.push({t:'ins',b:b[--j]});}
    else{ops.push({t:'del',a:a[--i]});}
  }
  ops.reverse();
  let ha='',hb='';
  for(const o of ops){
    if(o.t==='eq'){ha+=esc(o.a);hb+=esc(o.b);}
    else if(o.t==='del'){ha+=`<span class="char-del">${esc(o.a)}</span>`;}
    else{hb+=`<span class="char-ins">${esc(o.b)}</span>`;}
  }
  return {ha,hb};
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderDiff(diff) {
  let html = '', ins=0, del=0, eq=0, ln=0, rn=0;
  for (const d of diff) {
    if (d.type==='equal') {
      ln++; rn++; eq++;
      html += `<tr class="diff-equal"><td class="line-num left">${ln}</td><td>${esc(d.left)}</td><td class="spacer"></td><td class="line-num right">${rn}</td><td>${esc(d.right)}</td></tr>`;
    } else if (d.type==='delete') {
      ln++; del++;
      html += `<tr class="diff-delete"><td class="line-num left">${ln}</td><td>${esc(d.left)}</td><td class="spacer"></td><td class="line-num right"></td><td></td></tr>`;
    } else if (d.type==='insert') {
      rn++; ins++;
      html += `<tr class="diff-insert"><td class="line-num left"></td><td></td><td class="spacer"></td><td class="line-num right">${rn}</td><td>${esc(d.right)}</td></tr>`;
    } else { // modify
      ln++; rn++; del++; ins++;
      const {ha,hb} = charDiff(d.left, d.right);
      html += `<tr class="diff-modify-left"><td class="line-num left">${ln}</td><td>${ha}</td><td class="spacer"></td><td class="line-num right">${rn}</td><td>${hb}</td></tr>`;
    }
  }
  document.getElementById('diffTable').innerHTML = html;
  document.getElementById('statIns').textContent = ins;
  document.getElementById('statDel').textContent = del;
  document.getElementById('statEq').textContent = eq;
}

// Diff navigation
let currentDiffIndex = -1;
function getDiffRows() {
  return document.querySelectorAll('#diffTable tr:not(.diff-equal)');
}
document.getElementById('btnPrev').onclick = () => {
  const rows = getDiffRows();
  if (!rows.length) return;
  currentDiffIndex = currentDiffIndex <= 0 ? rows.length - 1 : currentDiffIndex - 1;
  rows[currentDiffIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
  highlightNav(rows);
};
document.getElementById('btnNext').onclick = () => {
  const rows = getDiffRows();
  if (!rows.length) return;
  currentDiffIndex = currentDiffIndex >= rows.length - 1 ? 0 : currentDiffIndex + 1;
  rows[currentDiffIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
  highlightNav(rows);
};
function highlightNav(rows) {
  rows.forEach(r => r.style.outline = '');
  rows[currentDiffIndex].style.outline = '2px solid #58a6ff';
  setTimeout(() => { rows[currentDiffIndex].style.outline = ''; }, 1500);
}

// --- Character-by-character mode ---
function renderCharModeDiff(textA, textB) {
  let a = textA, b = textB;
  if (ignoreSpaces) { a = a.replace(/\s+/g, ''); b = b.replace(/\s+/g, ''); }
  const origA = a, origB = b;
  let cmpA = a, cmpB = b;
  if (ignoreCase) { cmpA = a.toLowerCase(); cmpB = b.toLowerCase(); }

  // LCS on characters
  const n = cmpA.length, m = cmpB.length;
  // For very large texts, limit to avoid memory issues
  if (n > 50000 || m > 50000) {
    // Fallback: show simple side-by-side
    document.getElementById('diffTable').innerHTML =
      `<tr><td style="padding:12px;white-space:pre-wrap;word-break:break-all;width:50%;vertical-align:top">${esc(origA)}</td><td class="spacer"></td><td style="padding:12px;white-space:pre-wrap;word-break:break-all;width:50%;vertical-align:top">${esc(origB)}</td></tr>`;
    document.getElementById('statIns').textContent = '?';
    document.getElementById('statDel').textContent = '?';
    document.getElementById('statEq').textContent = '?';
    return;
  }

  const dp = Array.from({length: n+1}, () => new Int32Array(m+1));
  for (let i = 1; i <= n; i++)
    for (let j = 1; j <= m; j++)
      dp[i][j] = cmpA[i-1] === cmpB[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);

  let i = n, j = m;
  const ops = [];
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && cmpA[i-1] === cmpB[j-1]) {
      ops.push({t:'eq', a: origA[--i], b: origB[--j]});
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      ops.push({t:'ins', b: origB[--j]});
    } else {
      ops.push({t:'del', a: origA[--i]});
    }
  }
  ops.reverse();

  let ha = '', hb = '', ins = 0, del = 0, eq = 0;
  for (const o of ops) {
    if (o.t === 'eq') {
      eq++;
      const ch = esc(o.a);
      ha += ch; hb += esc(o.b);
    } else if (o.t === 'del') {
      del++;
      ha += `<span class="char-del">${esc(o.a)}</span>`;
    } else {
      ins++;
      hb += `<span class="char-ins">${esc(o.b)}</span>`;
    }
  }

  document.getElementById('diffTable').innerHTML =
    `<tr><td class="line-num left"></td><td style="white-space:pre-wrap;word-break:break-all;width:45%;vertical-align:top;padding:12px">${ha}</td><td class="spacer"></td><td class="line-num right"></td><td style="white-space:pre-wrap;word-break:break-all;width:45%;vertical-align:top;padding:12px">${hb}</td></tr>`;
  document.getElementById('statIns').textContent = ins;
  document.getElementById('statDel').textContent = del;
  document.getElementById('statEq').textContent = eq;
}
</script>
